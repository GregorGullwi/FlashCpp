---
name: CI - MSVC primary

on:
  push:
    branches: [ main, pre-flight ]
  pull_request:
    branches: [ main, pre-flight ]

jobs:
  windows-debug:
    name: Windows - MSVC - Sharded
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild (Visual Studio)
        uses: microsoft/setup-msbuild@v1

      - name: Build FlashCppMSVC project (Sharded)
        shell: powershell
        run: |
          # Build only the FlashCppMSVC project with MSBuild (Sharded) - uses MSVC toolset
          msbuild FlashCppMSVC.vcxproj /p:Configuration=Sharded /p:Platform=x64 /m

      - name: Test Reference Files (Compile & Link)
        shell: pwsh
        run: |
          # Run the reference files test script with parallel execution (default: all logical cores)
          # Requires PowerShell 7+ (pwsh) for ForEach-Object -Parallel support
          .\tests\run_all_tests.ps1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Reference files test failed!" -ForegroundColor Red
            exit 1
          }
